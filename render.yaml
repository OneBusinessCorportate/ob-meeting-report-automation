# Render Cron configuration for the OneBusiness daily meeting report.
#
# Schedule note: Render cron runs in UTC. Armenia is UTC+4 (no DST), so the
# desired 11:30 Armenia delivery time == 07:30 UTC.
#   "30 7 * * 1-5"  ->  07:30 UTC == 11:30 Armenia, Mon–Fri.
#
# Set the environment variables from .env.example in the Render dashboard
# (Environment tab) or via a synced env group. Never commit real secrets.

services:
  # ── Job 1: Morning meeting report + interview sync ──────────────────────────
  # Runs at 11:30 Armenia (07:30 UTC). If the recording isn't ready yet the
  # script retries every 30 min until 13:30 Armenia automatically.
  - type: cron
    name: ob-meeting-daily-report
    runtime: python
    schedule: "30 7 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_daily.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TIMELESS_API_TOKEN
        sync: false
      - key: TIMELESS_API_BASE_URL
        value: https://api.timeless.day/v1
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      # Only needed when AI_PROVIDER=gemini:
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_ID
        value: claude-sonnet-4-20250514
      - key: AI_PROMPT_VERSION
        value: full_transcript_prompt_v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"
      - key: MEETING_DEFAULT_SOURCE
        value: timeless
      - key: MEETING_DEFAULT_LANGUAGE
        value: hy
      - key: MEETING_DELIVERY_TIME
        value: "11:30"
      # --- Interview sync (same service; see scripts/run_daily.py) ---
      - key: INTERVIEW_FULL_INTERVAL_DAYS
        value: "1"
      - key: INTERVIEW_MINI_INTERVAL_DAYS
        value: "1"
      - key: INTERVIEW_SPREADSHEET_ID
        sync: false
      - key: INTERVIEW_SHEET_TABS
        value: "Бух"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: INTERVIEW_ANALYSIS_ENABLED
        value: "true"
      - key: INTERVIEW_TELEGRAM_ENABLED
        value: "false"

  # ── Job 2: Afternoon retry — catches calls that finish after 13:30 Armenia ──
  # Runs at 16:00 Armenia (12:00 UTC). Skips if a report was already delivered.
  # All pipeline steps are idempotent, so running again on the same day is safe.
  - type: cron
    name: ob-meeting-afternoon-retry
    runtime: python
    schedule: "0 12 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_daily_meeting_report.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TIMELESS_API_TOKEN
        sync: false
      - key: TIMELESS_API_BASE_URL
        value: https://api.timeless.day/v1
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_ID
        value: claude-sonnet-4-20250514
      - key: AI_PROMPT_VERSION
        value: full_transcript_prompt_v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"
      - key: MEETING_DEFAULT_SOURCE
        value: timeless
      - key: MEETING_DEFAULT_LANGUAGE
        value: hy

  # ── Job 3: Evening ArmSoft / TaxService cross-check (18:00 Armenia = 14:00 UTC) ──
  - type: cron
    name: ob-armsoft-evening-report
    runtime: python
    schedule: "0 14 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/deliver_armsoft.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"

