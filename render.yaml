# Render Cron configuration for the OneBusiness daily meeting report.
#
# Schedule note: Render cron runs in UTC. Armenia is UTC+4 (no DST).
#   06:00 UTC == 10:00 Armenia  (morning cron start — 4 checks every 30 min)
#   07:30 UTC == 11:30 Armenia  (4th/final check sends notice if still nothing)
#   12:00 UTC == 16:00 Armenia  (afternoon safety net for late-finishing calls)
#
# Set the environment variables from .env.example in the Render dashboard
# (Environment tab) or via a synced env group. Never commit real secrets.

services:
  # ── Job 1: Morning meeting report + interview sync ──────────────────────────
  # Starts at 11:00 Armenia (07:00 UTC). The script checks every 30 min, 4
  # times total (11:00 / 11:30 / 12:00 / 12:30). Sends the report as soon as
  # meetings appear. Sends "no calls" notice only on the 4th check (12:30) if
  # still nothing.
  - type: cron
    name: ob-meeting-daily-report
    runtime: python
    schedule: "0 7 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_daily.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TIMELESS_API_TOKEN
        sync: false
      - key: TIMELESS_API_BASE_URL
        value: https://api.timeless.day/v1
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_ID
        value: gemini-2.5-flash
      - key: AI_PROMPT_VERSION
        value: full_transcript_prompt_v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"
      - key: MEETING_DEFAULT_SOURCE
        value: timeless
      - key: MEETING_DEFAULT_LANGUAGE
        value: hy
      - key: MEETING_DELIVERY_TIME
        value: "11:30"
      # --- Interview sync (same service; see scripts/run_daily.py) ---
      - key: INTERVIEW_FULL_INTERVAL_DAYS
        value: "1"
      - key: INTERVIEW_MINI_INTERVAL_DAYS
        value: "1"
      - key: INTERVIEW_SPREADSHEET_ID
        sync: false
      - key: INTERVIEW_SHEET_TABS
        value: "Бух"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: INTERVIEW_ANALYSIS_ENABLED
        value: "true"
      - key: INTERVIEW_TELEGRAM_ENABLED
        value: "false"

  # ── Job 2: Afternoon safety net — catches calls that finish after 12:30 Armenia ──
  # Runs at 16:00 Armenia (12:00 UTC) as a single final check. Sends report if
  # meetings appeared after the morning window. Sends "no calls" notice if
  # morning notice was not yet sent. Skips silently if already delivered.
  - type: cron
    name: ob-meeting-afternoon-retry
    runtime: python
    schedule: "0 12 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/run_daily_meeting_report.py --final-check"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TIMELESS_API_TOKEN
        sync: false
      - key: TIMELESS_API_BASE_URL
        value: https://api.timeless.day/v1
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_ID
        value: gemini-2.5-flash
      - key: AI_PROMPT_VERSION
        value: full_transcript_prompt_v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"
      - key: MEETING_DEFAULT_SOURCE
        value: timeless
      - key: MEETING_DEFAULT_LANGUAGE
        value: hy

  # ── Job 3: Evening ArmSoft / TaxService cross-check (18:00 Armenia = 14:00 UTC) ──
  - type: cron
    name: ob-armsoft-evening-report
    runtime: python
    schedule: "0 14 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python scripts/deliver_armsoft.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        value: "-5035715113"

