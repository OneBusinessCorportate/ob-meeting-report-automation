# Render Cron configuration for the OneBusiness daily meeting report.
#
# Schedule note: Render cron runs in UTC. Armenia is UTC+4 (no DST), so the
# desired 11:00 Armenia delivery time == 07:00 UTC.
#   "0 7 * * 1-5"  ->  07:00 UTC == 11:00 Armenia, Mon–Fri.
#
# Set the environment variables from .env.example in the Render dashboard
# (Environment tab) or via a synced env group. Never commit real secrets.

services:
  - type: cron
    name: ob-meeting-daily-report
    runtime: python
    schedule: "0 7 * * 1-5"
    buildCommand: "pip install -r requirements.txt"
    # One service does both jobs (no extra Render service needed):
    #  1) the daily morning meeting report, and
    #  2) an interview-sync schedule check that runs a FULL sync ~every 30 days
    #     and a MINI sync (transcripts only) ~every 15 days. The cadence is
    #     time-based (tracked in intv_sync_logs), so it triggers on the first
    #     daily run on/after each threshold — independent of exact calendar days.
    startCommand: "python scripts/run_daily.py"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TIMELESS_API_TOKEN
        sync: false
      - key: TIMELESS_API_BASE_URL
        value: https://api.timeless.day/v1
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      # Only needed when AI_PROVIDER=gemini:
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_ID
        value: claude-sonnet-4-20250514
      - key: AI_PROMPT_VERSION
        value: full_transcript_prompt_v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGEMENT_CHAT_ID
        sync: false
      - key: MEETING_DEFAULT_SOURCE
        value: timeless
      - key: MEETING_DEFAULT_LANGUAGE
        value: hy
      - key: MEETING_DELIVERY_TIME
        value: "11:00"
      # --- Interview sync (same service; see scripts/run_daily.py) ---
      # Cadence overrides (days); defaults: full=30, mini=15.
      - key: INTERVIEW_FULL_INTERVAL_DAYS
        value: "30"
      - key: INTERVIEW_MINI_INTERVAL_DAYS
        value: "15"
      # Source of the candidate/interview table (set the secret in the dashboard):
      - key: INTERVIEW_SPREADSHEET_ID
        sync: false
      - key: INTERVIEW_SHEET_TABS
        value: "Бух"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON   # share the sheet + transcript docs with this account
        sync: false
      - key: INTERVIEW_ANALYSIS_ENABLED
        value: "true"
      - key: INTERVIEW_TELEGRAM_ENABLED
        value: "false"

